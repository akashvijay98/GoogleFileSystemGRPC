syntax = "proto3";

option java_multiple_files = true;
package com.gfs.grpc;

service MasterService{
  rpc GetUploadLocation(FileRequest) returns (ChunkLocationResponse);
  rpc GetDownloadLocations(ChunkRequest) returns (ChunkLocationList);
  rpc GetFileChunks(FileRequest) returns (ChunkLocationList);
  rpc ListFiles(Empty) returns (FileList);
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

service ChunkService {
  rpc WriteChunk(WriteChunkRequest) returns (WriteChunkResponse);
  rpc DownloadChunk(ChunkRequest) returns (stream ChunkData);
}

message HeartbeatRequest {
  string serverAddress = 1;
}

message HeartbeatResponse {
  bool success = 1;
}

message ChunkData{
  string chunkId = 1;
  bytes data = 2;
}
message ChunkLocationResponse{
  string chunkId =1;
  string primaryServerAddress = 2;
  repeated string replicaServerAddresses = 3;
  int64 leaseExpirationEpochMillis = 4;
}

message ChunkLocationList{
  repeated ChunkLocationResponse chunks = 1;
}

message ChunkRequest{
  string chunkId = 1;
}

message FileRequest{
  string fileName =1;
}

message UploadStatus {bool success = 1; }

message WriteChunkRequest {
  string chunkId = 1;
  bytes data = 2;
  repeated string secondaryReplicas = 3;
  bool replicatedWrite = 4;
}

message WriteChunkResponse {
  bool success = 1;
}

message FileList {
  repeated string fileNames = 1;
}

message Empty {}
